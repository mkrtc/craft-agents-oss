name: Electron Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build, e.g. v0.10.7'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: electron-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  BUN_VERSION: '1.3.10'

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must match vMAJOR.MINOR.PATCH, got: $RELEASE_TAG"
            exit 1
          fi

          git fetch --force --tags origin
          if ! git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "::error::Tag does not exist: $RELEASE_TAG"
            exit 1
          fi

          expected_version="${RELEASE_TAG#v}"
          package_version="$(git show "$RELEASE_TAG:apps/electron/package.json" | python3 -c 'import json, sys; print(json.load(sys.stdin)["version"])')"
          if [[ "$package_version" != "$expected_version" ]]; then
            echo "::error::apps/electron/package.json version ($package_version) does not match tag ($expected_version)"
            exit 1
          fi

      - name: Ensure draft GitHub Release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists"
          else
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --verify-tag \
              --title "Craft Agents $RELEASE_TAG" \
              --notes "Automated Electron release for $RELEASE_TAG. Assets are built by GitHub Actions."
          fi

  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: prepare-release

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Build AppImage
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bash apps/electron/scripts/build-linux.sh x64

      - name: Upload Linux release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=(
            apps/electron/release/Craft-Agents-*.AppImage
            apps/electron/release/latest-linux.yml
            apps/electron/release/*.blockmap
          )

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No Linux release assets found"
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber

  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-latest
    timeout-minutes: 120
    needs: prepare-release

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Build DMG and updater ZIP
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bash apps/electron/scripts/build-dmg.sh arm64

      - name: Upload macOS release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=(
            apps/electron/release/Craft-Agents-arm64.dmg
            apps/electron/release/Craft-Agents-arm64.zip
            apps/electron/release/latest-mac.yml
            apps/electron/release/Craft-Agents-arm64.*.blockmap
          )

          existing=()
          for file in "${files[@]}"; do
            [[ -f "$file" ]] && existing+=("$file")
          done

          if [[ ${#existing[@]} -eq 0 ]]; then
            echo "::error::No macOS release assets found"
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${existing[@]}" --repo "$GITHUB_REPOSITORY" --clobber

  build-windows-x64:
    name: Build Windows x64
    runs-on: windows-latest
    timeout-minutes: 120
    needs: prepare-release

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Build NSIS installer
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File apps/electron/scripts/build-win.ps1

      - name: Upload Windows release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          $patterns = @(
            "apps/electron/release/Craft-Agents-*.exe",
            "apps/electron/release/latest.yml",
            "apps/electron/release/*.blockmap"
          )

          $files = @()
          foreach ($pattern in $patterns) {
            $files += Get-ChildItem -Path $pattern -File -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
          }

          if ($files.Count -eq 0) {
            Write-Error "No Windows release assets found"
          }

          & gh release upload $env:RELEASE_TAG @files --repo $env:GITHUB_REPOSITORY --clobber

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build-linux-x64
      - build-macos-arm64
      - build-windows-x64

    steps:
      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest
